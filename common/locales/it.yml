    rest_of_name_tooltip: "<p>Il primo elemento del nome o del nome proprio e nomi aggiuntivi, ad es.
      secondo nome, per la persona nominata nell'unità archivistica.</p>\n<p>Esempi:</p>\n<ul>\n<li>Winston
      <em>(per Churchill, Winston, Sir, 1874-1965)</em></li>\n<li>Alda <em>(per Merini, Alda, 1931-2009)</em></li>\n\
      </ul>\n"
    suffix_tooltip: "<p>Un termine che segue un nome, il termine qualifica il nome ma non è un titolo.</p>\n\
      <p>Esempi</p>\n<ul>\n<li>Jr.</li>\n<li>F.lli</li>\n</ul>\n"
    fuller_form: Forma più completa
    number: Numero
    dates: Date
    dates_tooltip: "<p>Usa questo campo per l'allineamento con il record d'autorità MARC. Queste date,
      a differenza delle date di esistenza, sono aggiunte alla voce nome nella visualizzazione.</p>\n\
      \ <p>Date di esistenza per l'entità nominata.</p>\n<p>Esempi:<p>\n<ul>\n<li>1876-1960 <em>(per S.B.,
      Sibilla Aleramo, 1876-1960)</em></li>\n</ul>\n"
    qualifier: Qualificativo
    primary_name_tooltip: "<p>La parte principale di un nome (ad es. il nome di famiglia o il cognome
      di una persona).</p>\n<p>Esempi:</p>\n<ul>\n<li>Churchill <em>(per Churchill, Winston, Sir, 1874-1965
      [persona])</em></i>\n<li>Porsenna <em>(per Porsenna, Lars, Lucumone, VI secolo a.c.-V secolo a.c.
      [persona])</em></li>\n<li>Intesa Sanpaolo <em>(per Banca Intesa Sanpaolo S.p.A [entità aziendale])</em></li>\n\
      </ul>\n"
    title_tooltip: "<p>Un titolo che è parte del nome.</p>\n<p>Esempi:</p>\n<ul>\n<li>Sir <em>(per Churchill,
      Winston, Sir, 1874-1965)</em></li>\n<li>Lucumone (per Porsenna, Lars, Lucumone, VI secolo a.c.-V
      secolo a.c.)</li>\n<li>Imperatore d'Oriente <em>(per Costantino I. Imperatore bizantino o dell'Impero
      romano d'Oriente.)</em></li>\n</ul>\n"
    number_tooltip: "<p>Un numero, a volte con un termine, che qualifica il nome. Per gli antroponimi
      è spesso un numero romano o un numero romano e una seguente parte di un nome. Per i nomi di aziende
      è il numero di una parte / sezione o di una assemblea.</p>\n<p>Esempi:</p>\n<ul>\n<li>I Costantino
      <em>(per Costantino I, Imperatore bizantino d'Oriente</em></li>\n<li>I <em>(per Cosimo I de' Medici)</em></li>\n\
      \ <li>150º <em>(per 150º anniversario dell'Unità d'Italia)</em></li>\n</ul>\n"
    fuller_form_tooltip: "<p>La forma più completa dei nomi o secondi nomi, quando abbreviati.</p>\n<p>Esempi</p>\n\
      \ <ul>\n<li>Sibilla Aleramo <em>(per S.B., Sibilla Aleramo, 1876-1960)</em></li>\n</ul>\n"
    authorized: Autorizzato
    is_display_name: Nome visualizzato
    language: Lingua
    language_tooltip: "<p>Indica la lingua usata nella registrazione del nome.</p><p>Vedi DACS 13.7, ISAAR
      (CPF) 5.4.7. Esempio: Russo (per Каспаров, Г. К. (Гарри Кимович))</p>\n"
    script: Script
    transliteration: Traslitterazione
    transliteration_tooltip: "<p>Indica lo schema di traslitterazione usato nella registrazione del nome.</p>\n"
    script_tooltip: "<p>Indica lo script usato nella registrazione del nome.</p><p>Vedi DACS 13.7, ISAAR
      (CPF) 5.4.7. Esempio: Cirillico (per Каспаров, Г. К. (Гарри Кимович))</p>\n"
    qualifier_tooltip: "<p>Un termine o una frase per distinguere due nomi identici in tutti gli aspetti
      ma che identificano due entità differenti.  Il termine può essere una data, un luogo od ogni altro
      descrittore adatto.</p>\n<p>Esempi:</p>\n<ul>\n<li>Fioristi <em>(per famiglia Bianchi (fioristi))</em>)</li>\n\
      \ <li>Santa Maria Novella, Firenze, Toscana <em>(per Chiesa di Santa Maria Novella (Santa Maria
      Novella, Firenze, Toscana))</em></li>\n</ul>\n"
    authority_id: ID di autorizzazione
    authority_id_tooltip: |
      <p>L'identificativo univoco per il Nome di un Agente all'interno della fonte da cui è stato acquisito (ovvero, un identificativo di record MADS o un identificativo di record EAC). L'identificativo può essere rappresentato come un URI.</p>
      <p>Esempi:</p>
      <ul>
      <li>nr92045078 <em>per un'intestazione di nome LCNAF</em></li>
      <li>500115393 <em>per un'intestazione di nome ULAN</em></li>
      <li>http://viaf.org/viaf/134138653 <em>per un'intestazione di nome VIAF</em>
      </ul>
    source_tooltip: |
      <p>CAMPO OBBLIGATORIO CONDIZIONALMENTE, se non si utilizzano le Regole Nome. Indica la fonte autorevole da cui è stato tratto il nome.</p>
      <p>I valori in questo Elenco di valori controllati possono essere modificati.</p>
    rules_tooltip: |
      <p>CAMPO OBBLIGATORIO CONDIZIONALMENTE, se non si utilizza l'origine del nome. Indica le regole utilizzate per formulare la voce del nome.</p>
      <p>I valori in questo elenco di valori controllati possono essere modificati.</p>
      <p>Vedere DACS 13.3, ISAAR (CPF) 5.4.3</p>
    name_order: Ordine dei nomi
    use_dates: Date di utilizzo
    use_dates_tooltip: |
      <p>Date in cui questo nome è stato utilizzato per l'agente.</p>
    parallel_names_tooltip: |
      <p>Può essere utilizzato per registrare una forma parallela del nome in diverse lingue e/o alfabeti o forme traslitterate del nome.</p>
      <p>Vedi DACS 10.3.1, ISAAR (CPF) 5.1.3</p>
    sort_name: Nome di ordinamento
    sort_name_tooltip: |
      <p>Una versione del nome che concatena tutte le parti del nome fornite in un determinato record dell'agente. Utilizzata a scopo di visualizzazione nell'applicazione e per alcune esportazioni.</p>
      <p>Il nome di ordinamento può essere modificato deselezionando la casella di controllo "Genera automaticamente" e quindi inserendo il formato desiderato per il nome di ordinamento.</p>
    _singular: Modulo Nome
    _plural: Moduli del nome
