      </ul>
  agent_record_control:
    maintenance_status_tooltip: |
      <p>Indica lo stato attuale del record.</p><p>Vedi DACS 13.4, ISAAR (CPF) 5.4.4</p>
    publication_status_tooltip: |
      <p>Indica se un record di un agente deve essere reso pubblico.</p>
    romanization_tooltip: |
      <p>Indica se la forma autorizzata del nome è stata romanizzata da un alfabeto non latino e il tipo di schema di romanizzazione. Esempio: standard della biblioteca nazionale o dell'agenzia bibliografica (per la tabella di romanizzazione ALA-LC (ad esempio, Kasparov, G. K. (Garri Kimovich) per Каспаров, Г. К. (Гарри Кимович)).</p>
    government_agency_type_tooltip: |
      <p>Indica il tipo di ente o giurisdizione rappresentato dalla denominazione autorizzata.</p>
    reference_evaluation_tooltip: |
      <p>Indica il livello di coerenza tra la forma del nome autorizzato e le altre forme del nome presenti nel record dell'agente. In assenza di forme aggiuntive, il campo deve essere contrassegnato come "Non applicabile".</p>
    name_type_tooltip: |
      <p>Indica l'unicità del nome autorizzato all'interno del modulo Agenti. Le voci con nome univoco devono essere registrate come "Differenziate", mentre i record degli agenti utilizzati per raggruppare più agenti con nomi identici devono essere contrassegnati come "Non differenziati".</p>
    level_of_detail_tooltip: |
      <p>Indica la completezza del record dell'agente in conformità ai requisiti consortili o locali.</p><p>Vedi DACS 13.5, ISAAR (CPF) 5.4.5</p>
    modified_record_tooltip: |
      <p>Indica se un record di un agente è stato modificato e in che modo.</p>
    cataloging_source_tooltip: |
      <p>Indica la provenienza di un record dell'agente. I record prodotti localmente e non inviati a un programma di catalogazione cooperativa devono essere registrati come "Altro".</p>
    maintenance_agency_tooltip: |
      <p>Codice identificativo dell'agenzia o organizzazione responsabile della creazione o della gestione di un record Agente. Il codice deve essere ricavato da un registro e registrato secondo le convenzioni ISO 15511.</p><p>Vedere DACS 13.1, ISAAR (CPF) 5.4.2.</p><p>Esempio: US-UPB (per la Brigham Young University, utilizzando il codice organizzativo MARC della Biblioteca del Congresso).</p>
    agency_name_tooltip: |
      <p>Il nome dell'agenzia o dell'organizzazione responsabile della creazione o della gestione di un record dell'agente. Il nome registrato deve corrispondere alla forma del nome associata al valore del codice nel registro.</p><p>Vedere ISAAR (CPF) 5.4.2.</p><p>Esempio: Brigham Young University, Harold B. Lee Library (per il valore del codice UPB, utilizzando il codice organizzativo MARC della Biblioteca del Congresso).</p>
    maintenance_agency_note_tooltip: |
      <p>Il contenuto della nota, che fornisce dettagli sull'agenzia di manutenzione responsabile della descrizione dell'agente.</p>
    language_tooltip: |
      <p>La lingua utilizzata nella preparazione della descrizione dell'agente.</p><p>Vedi DACS 13.7, ISAAR (CPF) 5.4.7.</p><p>Esempio: inglese.</p>
    script_tooltip: |
      <p>Il testo utilizzato per la preparazione della descrizione dell'agente.</p><p>Vedi DACS 13.7, ISAAR (CPF) 5.4.7.</p><p>Esempio: latino.</p>
    language_note_tooltip: |
      <p>Il contenuto della nota, che fornisce dettagli sulla lingua e sugli script utilizzati nella preparazione della descrizione dell'agente.</p>
