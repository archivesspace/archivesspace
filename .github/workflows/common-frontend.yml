name: Frontend Testing Sub-Workflow
permissions:
  contents: read
  pull-requests: write

on:
  workflow_call:
    inputs:
      shard:
        description: Which shard this job runs
        required: true
        type: string
      total:
        description: Total number of shards the specs are split across
        required: true
        type: string
      name:
        required: true
        type: string
      java-version:
        required: true
        type: string
        default: '17'
      browser:
        description: Which browser to use
        required: true
        type: string
        default: 'firefox'

jobs:
  frontend:
    name: ${{ inputs.name }}
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    services:
      db:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: archivesspace
          MYSQL_USER: as
          MYSQL_PASSWORD: as123
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=9s --health-retries=10
      solr:
        image: solr:9.4.1
        env:
          SOLR_MODULES: analysis-extras
        ports:
          - 8984:8983

    steps:
    - uses: browser-actions/setup-geckodriver@latest
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - run: geckodriver --version
    - run: firefox --version
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: ${{ inputs.java-version || 17 }}
        distribution: temurin

    - uses: './.github/actions/bootstrap'
      with:
        backend: true
        frontend: true
        indexer: true

    - name: Allow ArchivesSpace functions for app db user
      env:
        DB_PORT: "3307"
      run: |
        mysql --host 127.0.0.1 --port $DB_PORT -uroot -proot -e 'SET GLOBAL log_bin_trust_function_creators = 1;'

    - name: Copy solr config from workspace to solr service
      env:
        SOLR_ID: ${{ job.services.solr.id }}
      run: |
        docker cp solr $SOLR_ID:/solr_conf_from_repo

    - name: Create ArchivesSpace Solr core
      env:
        SOLR_ID: ${{ job.services.solr.id }}
      run: |
        docker exec --tty $SOLR_ID solr create_core -p 8983 -c archivesspace -d /solr_conf_from_repo

    - name: Setup firefox
      id: setup-firefox
      uses: browser-actions/setup-firefox@v1
      with:
        firefox-version: 'latest'

    - name: Get spec files for this shard
      id: shard-files
      working-directory: frontend
      run: |
        TOTAL_SHARDS=${{ inputs.total }}
        CURRENT_SHARD=${{ inputs.shard }}

        ALL_FILES=($(ls spec/features/*_spec.rb spec/models/*_spec.rb spec/controllers/*_spec.rb | sort))
        TOTAL_FILES=${#ALL_FILES[@]}

        FILES_PER_SHARD=$(( (TOTAL_FILES + TOTAL_SHARDS - 1) / TOTAL_SHARDS ))
        START_INDEX=$(( (CURRENT_SHARD - 1) * FILES_PER_SHARD ))

        SHARD_FILES="${ALL_FILES[@]:$START_INDEX:$FILES_PER_SHARD}"

        echo "Running specs for shard $CURRENT_SHARD of $TOTAL_SHARDS ($TOTAL_FILES specs total)"
        echo "Files to test: $SHARD_FILES"
        echo "files=$SHARD_FILES" >> $GITHUB_OUTPUT

    - name: Run Frontend tests
      run: |
        if [ -z "${{ steps.shard-files.outputs.files }}" ]; then
          echo "No specs assigned to this shard; nothing to run."
          exit 0
        fi
        ./build/run frontend:test -Dspecs="${{ steps.shard-files.outputs.files }}"
      env:
        SELENIUM_CHROME: ${{ inputs.browser == 'chrome' }}
        ARCHIVESSPACE_VERSION: ${{ github.ref }}

    - uses: actions/upload-artifact@v6
      if: failure()
      with:
        name: failed_spec_saved_pages(${{ inputs.name }})_Java_${{ inputs.java-version || 17 }}
        path: 'ci_logs'

    - name: Post Coverage to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        format: simplecov
        compare-ref: ${{ github.event.repository.default_branch }}
        flag-name: ${{ inputs.name }}
        debug: false
        parallel: true
