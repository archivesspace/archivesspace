name: Code Scan
permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      java-version:
        description: Java version to run specs on
        required: true
        type: choice
        options:
          - '11'
          - '17'
        default: '17'

  workflow_call:
    inputs:
      java-version:
        description: Java version to run specs on
        required: true
        type: string
        default: '17'

jobs:
  rubocop:
    name: Rubocop_Java_v${{ inputs.java-version || 17 }} # https://archivesspace.atlassian.net/browse/ANW-2022
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version || 17 }}
          distribution: temurin

      - name: Run rubocop
        run: |
          ./build/run rubocop

  rubocop-e2e:
    name: E2E-rubocop
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e-tests
    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.0'
      - name: Cache gems
        uses: actions/cache@v3
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - name: Install gems
        run: |
          gem install parallel_tests
          bundle config path vendor/bundle
          bundle install --quiet --jobs 4 --retry 3
      - name: Run rubocop
        run: |
          bundle exec rubocop

  cucumber-dry-run:
    name: E2E-ensure-all-steps-implemented
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e-tests
    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.0'
      - name: Cache gems
        uses: actions/cache@v3
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - name: Install gems
        run: |
          gem install parallel_tests
          bundle config path vendor/bundle
          bundle install --quiet --jobs 4 --retry 3
      - name: Cucumber strict dry run to check for not implemented steps
        run: |
          set -o pipefail
          bundle exec cucumber --dry-run --strict --no-color | tee cucumber-dry-run.out
          # cucumber --dry-run always exits 0; parse the summary line to fail on undefined/pending steps.
          if grep -Eq '^[0-9]+ steps? \(.*\b(undefined|pending)\b' cucumber-dry-run.out; then
            echo "::error::Cucumber dry run found undefined or pending steps"
            exit 1
          fi

  eslint:
    name: ESLint_Java_v${{ inputs.java-version || 17 }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint on front ends
        run: npm run eslint:ci

  stylelint:
    name: Stylelint_Java_v${{ inputs.java-version || 17 }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Run Stylelint on front ends
        run: npm run stylelint:ci

  prettier:
    name: Prettier_Java_v${{ inputs.java-version || 17 }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier on front ends
        run: npm run prettier:ci
