name: Code Scan
permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      java-version:
        description: Java version to run specs on
        required: true
        type: choice
        options:
          - '11'
          - '17'
        default: '17'

  workflow_call:
    inputs:
      java-version:
        description: Java version to run specs on
        required: true
        type: string
        default: '17'

jobs:
  rubocop:
    name: Rubocop_Java_v${{ inputs.java-version || 17 }} # https://archivesspace.atlassian.net/browse/ANW-2022
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version || 17 }}
          distribution: temurin

      - name: Run rubocop
        run: |
          ./build/run rubocop

  rubocop-e2e:
    name: Rubocop-e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e-tests
    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.0'
      - name: Cache gems
        uses: actions/cache@v3
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - name: Install gems
        run: |
          gem install parallel_tests
          bundle config path vendor/bundle
          bundle install --quiet --jobs 4 --retry 3
      - name: Run rubocop
        run: |
          bundle exec rubocop

  eslint:
    name: ESLint_Java_v${{ inputs.java-version || 17 }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint on front ends
        run: npm run eslint:ci

  stylelint:
    name: Stylelint_Java_v${{ inputs.java-version || 17 }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Run Stylelint on front ends
        run: npm run stylelint:ci

  prettier:
    name: Prettier_Java_v${{ inputs.java-version || 17 }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier on front ends
        run: npm run prettier:ci
