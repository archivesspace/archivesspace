name: Frontend Testing
permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      java-version:
        description: Java version to run specs on
        required: true
        type: choice
        options:
          - '11'
          - '17'
        default: '17'
      shard-count:
        description: How many parallel shards to split the specs across (blank uses the FRONTEND_SHARD_COUNT repo variable, default 10)
        required: false
        type: string
        default: ''
      browser:
        description: Which browser to use
        required: true
        type: choice
        options:
          - 'chrome'
          - 'firefox'
        default: 'firefox'

  workflow_call:
    inputs:
      java-version:
        description: Java version to run specs on
        required: true
        type: string
        default: '17'
      shard-count:
        required: false
        type: string
        default: ''
      browser:
        description: Which browser to use
        required: true
        type: string
        default: 'firefox'

jobs:
  setup:
    name: Setup Matrix
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.set-matrix.outputs.shards }}
      count: ${{ steps.set-matrix.outputs.count }}
    steps:
      - id: set-matrix
        run: |
          SHARD_COUNT="${{ inputs.shard-count || vars.FRONTEND_SHARD_COUNT || 10 }}"
          shards=$(seq 1 $SHARD_COUNT | jq -c --slurp)
          echo "shards=$shards" >> $GITHUB_OUTPUT
          echo "count=$SHARD_COUNT" >> $GITHUB_OUTPUT
          echo "Generated matrix for $SHARD_COUNT shards: $shards"

  frontend:
    needs: setup
    name: shard-${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.setup.outputs.shards) }}
    uses: ./.github/workflows/common-frontend.yml
    secrets: inherit
    with:
      shard: ${{ matrix.shard }}
      total: ${{ needs.setup.outputs.count }}
      name: shard-${{ matrix.shard }}
      java-version: ${{ inputs.java-version || 17 }}
      browser: ${{ inputs.browser || 'firefox' }}
